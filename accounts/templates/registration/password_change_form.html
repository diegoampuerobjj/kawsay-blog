{% extends 'base.html' %}

{% block title %}Change Password - Kawsay{% endblock %}

{% block content %}
<section class="blog-section">
    <div class="blog-header">
        <h1>Change Password</h1>
        <div class="post-detail-actions">
            <a href="{% url 'profile' %}" class="btn btn-sm btn-outline-primary">Back to Profile</a>
        </div>
    </div>

    <div class="auth-card">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Change Password</button>
        </form>
    </div>
</section>
{% endblock %}
