{% extends 'base.html' %}

{% block title %}Preview: {{ post.title }} - Kawsay{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row">
    <div class="col-md-8 offset-md-2">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>{{ post.title }}</h1>
        <a href="{% url 'editor:edit' post.slug %}" class="btn btn-outline-primary">Back to Editor</a>
      </div>

      {% if post.featured_image %}
        <figure class="mb-4">
          <img src="{{ post.featured_image.url }}" alt="{{ post.title }}" class="img-fluid">
        </figure>
      {% endif %}

      <section class="post-content">
        {{ html|safe }}
      </section>
    </div>
  </div>
</div>
{% endblock %}
